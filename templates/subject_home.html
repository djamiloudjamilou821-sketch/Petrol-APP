<!DOCTYPE html>
<html>
<head>
    <title>Foundations of Petroleum Engineering</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">
    <style>
        body{
            margin:0;
            font-family:Arial;
            background: linear-gradient(rgba(15,23,42,0.85), rgba(15,23,42,0.85)),
                url("/static/hb.jpg");

            background-size: cover;
            background-position: center;
            color:white;
        }

        .container{
            width:92%;
            max-width:850px;
            margin:auto;
            padding:20px;
        }

        h1{
            text-align:center;
            color:#38bdf8;
            font-size:22px;
        }

        .card{
            background:#1e293b;
            padding:16px;
            border-radius:12px;
            margin-top:12px;
        }

        .title{
            font-size:18px;
            font-weight:bold;
            color:#38bdf8;
            margin-bottom:8px;
        }

        .desc{
            font-size:14px;
            color:#cbd5e1;
            line-height:1.6;
        }
    </style>
</head>

<body>

<div class="container">
    
    <div class="top-nav">
        <a href="javascript:history.back()" class="back-arrow">
            ⬅
        </a>
    </div>

    <h1>📘 Foundations of Petroleum Engineering</h1>

    {% for subject in subjects %}
        <div class="card">
            <div class="title">{{ subject.name }}</div>
            <div class="desc">{{ subject.description }}</div>
        </div>
    {% endfor %}

</div>

</body>
</html>
