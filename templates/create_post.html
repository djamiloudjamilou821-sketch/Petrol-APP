<!DOCTYPE html>
<html>
<head>
    <title>Create Post</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">
    <style>
        body{
            margin:0;
            font-family:system-ui, -apple-system, Arial;
            background:#0b1220;
            color:white;
            -webkit-font-smoothing:antialiased;
        }

        .container{
            width:92%;
            max-width:520px;
            margin:auto;
            padding:18px 14px;
        }

        /* TOP NAV */
        .top-nav{
            display:flex;
            align-items:center;
            margin-bottom:10px;
        }

        .back-arrow{
            width:40px;
            height:40px;
            display:flex;
            align-items:center;
            justify-content:center;
            border-radius:12px;
            text-decoration:none;
            color:white;
            font-size:20px;
            background:#111827;
            transition:0.2s;
        }

        .back-arrow:active{
            transform:scale(0.95);
        }

        /* TITLE */
        h1{
            text-align:left;
            color:#38bdf8;
            font-size:20px;
            margin:10px 0 18px;
        }

        /* FORM CARD */
        form{
            background:#111827;
            padding:14px;
            border-radius:16px;
            box-shadow:0 6px 20px rgba(0,0,0,0.25);
        }

        /* TEXTAREA */
        textarea{
            width:100%;
            padding:12px;
            border:none;
            border-radius:12px;
            background:#0b1220;
            color:white;
            resize:none;
            font-size:15px;
            outline:none;
            min-height:120px;
        }

        /* FILE INPUT */
        input[type="file"]{
            width:100%;
            margin-top:12px;
            padding:10px;
            background:#0b1220;
            border-radius:12px;
            color:white;
            font-size:13px;
        }

        /* BUTTON */
        button{
            width:100%;
            margin-top:14px;
            padding:12px;
            background:#10b981;
            border:none;
            border-radius:12px;
            color:white;
            font-weight:600;
            font-size:15px;
            cursor:pointer;
            transition:0.2s;
        }

        button:active{
            transform:scale(0.98);
        }

        /* NOTE TEXT */
        .note{
            font-size:12px;
            color:#94a3b8;
            text-align:center;
            margin-top:12px;
        }

        /* MOBILE IMPROVEMENTS */
        @media (max-width:600px){

            .container{
                width:94%;
                padding:14px;
            }

            h1{
                font-size:18px;
            }

            textarea{
                font-size:14px;
            }

            button{
                font-size:14px;
                padding:11px;
            }
        }   
    </style>
</head>

<body>

<div class="container">
    <div class="top-nav">
        <a href="javascript:history.back()" class="back-arrow">
            ⬅
        </a>
    </div>

    <h1>📝 Create Post</h1>

    <!-- IMPORTANT: multipart for image upload -->
    <form method="POST" enctype="multipart/form-data">

        <textarea name="content" rows="5" placeholder="Share something" required></textarea>

        <button type="submit">Publish</button>

    </form>

    <div class="note">
        You can upload image
    </div>


</div>
<script>
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");

imageInput.addEventListener("change", function () {

    const file = this.files[0];

    if (file) {

        const reader = new FileReader();

        reader.onload = function (e) {
            preview.src = e.target.result;
            preview.style.display = "block";
        }

        reader.readAsDataURL(file);

    } else {
        preview.src = "";
        preview.style.display = "none";
    }
});
</script>
</body>
</html>
