<!DOCTYPE html>
<html>
<head>
    <title>Create Post</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family:system-ui, -apple-system, Arial;
            background:#0b1220;
            color:white;
            -webkit-font-smoothing:antialiased;
        }

        .container{
            width:92%;
            max-width:600px;
            margin:auto;
            padding:20px 14px;
        }

        /* TOP BAR */
        .top-nav{
            display:flex;
            align-items:center;
            gap:10px;
            margin-bottom:12px;
        }

        .back-arrow{
            width:42px;
            height:42px;
            display:flex;
            align-items:center;
            justify-content:center;
            border-radius:12px;
            text-decoration:none;
            color:white;
            font-size:20px;
            background:#111827;
        }

        h1{
            font-size:20px;
            color:#38bdf8;
            margin:10px 0 18px;
        }

        /* CARD */
        .card{
            background:#111827;
            border-radius:16px;
            padding:16px;
            box-shadow:0 10px 25px rgba(0,0,0,0.25);
        }

        /* TEXTAREA */
        textarea{
            width:100%;
            min-height:130px;
            padding:12px;
            border:none;
            border-radius:12px;
            background:#0b1220;
            color:white;
            font-size:15px;
            outline:none;
            resize:none;
        }

        /* FILE INPUT */
        input[type="file"]{
            width:100%;
            margin-top:12px;
            padding:10px;
            border-radius:12px;
            background:#0b1220;
            color:white;
            font-size:13px;
        }

        /* IMAGE PREVIEW */
        .preview{
            width:100%;
            margin-top:12px;
            border-radius:12px;
            display:none;
            object-fit:cover;
            max-height:300px;
        }

        /* BUTTON */
        button{
            width:100%;
            margin-top:14px;
            padding:12px;
            background:#10b981;
            border:none;
            border-radius:12px;
            color:white;
            font-weight:600;
            font-size:15px;
            cursor:pointer;
        }

        button:active{
            transform:scale(0.98);
        }

        /* NOTE */
        .note{
            text-align:center;
            font-size:12px;
            color:#94a3b8;
            margin-top:12px;
        }

        /* RESPONSIVE */
        @media (min-width:768px){
            h1{
                font-size:24px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="top-nav">
        <a href="javascript:history.back()" class="back-arrow">⬅</a>
        <h1>📝 Create Post</h1>
    </div>

    <form method="POST" enctype="multipart/form-data" class="card">

        <textarea name="content" placeholder="Share something..." required></textarea>

        <input type="file" name="image" id="imageInput" accept="image/*">

        <img id="preview" class="preview">

        <button type="submit">Publish</button>

    </form>

    <div class="note">
        Upload photos and share your ideas with the community
    </div>

</div>

<script>
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");

imageInput.addEventListener("change", function () {

    const file = this.files[0];

    if (file) {
        const reader = new FileReader();

        reader.onload = function (e) {
            preview.src = e.target.result;
            preview.style.display = "block";
        };

        reader.readAsDataURL(file);
    } else {
        preview.style.display = "none";
        preview.src = "";
    }
});
</script>

</body>
</html>
