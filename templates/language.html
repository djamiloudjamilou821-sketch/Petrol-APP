<!DOCTYPE html>
<html>
<head>
    <title>Select Language</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(rgba(15,23,42,0.9), rgba(15,23,42,0.9)),
                        url("/static/bg.jpg");

            background-size: cover;
            background-position: center;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 22px;
        }

        p {
            color: #cbd5e1;
            font-size: 14px;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1d4ed8;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>🌍 Choose Your Language</h1>
    <p>Select your preferred language to continue</p>

    <form method="POST">

        <button name="lang" value="en">
            🇬🇧 English
        </button>

        <button name="lang" value="fr">
            🇫🇷 Français
        </button>

    </form>

    <div class="footer">
        Petroleum Engineering Learning App
    </div>

</div>

</body>
</html>
