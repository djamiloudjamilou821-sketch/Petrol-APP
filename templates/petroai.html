<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PetroAI Chat Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* ==========================================================================
        CORE RESET & VARIABLE CONFIGURATION
        ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0b0f19;
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; /* Force layout engine to strictly match exact screen boundaries */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
        }

        /* ==========================================================================
        TOP NAVIGATION HEADER (PERFECT MOBILE STATUS BAR GAP)
        ========================================================================== */
        .header {
            background: #111827;
            padding: 16px 16px; /* Increased vertical padding to push content away from system icons */
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.2px;
            border-bottom: 1px solid #1f2937;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            gap: 12px;
            width: 100%;
        }

        /* Container helper to keep title centered even with side buttons */
        .header-title {
            flex: 1;
            text-align: center;
            margin-right: 40px; /* Balances out the width of the back button perfectly */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .top-nav {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .back-arrow {
            text-decoration: none;
            color: #9ca3af;
            font-size: 13px;
            font-weight: 500;
            background: #1f2937;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #374151;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
        }

        .back-arrow:hover {
            color: #f3f4f6;
            background: #374151;
            border-color: #4b5563;
        }

        /* ==========================================================================
        STREAMING CHAT WORKSPACE
        ========================================================================== */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            scrollbar-width: thin;
            scrollbar-color: #2d3748 transparent;
        }

        #chat-box::-webkit-scrollbar {
            width: 5px;
        }
        #chat-box::-webkit-scrollbar-thumb {
            background: #2d3748;
            border-radius: 10px;
        }

        /* ==========================================================================
        CHAT BUBBLES GRAPHICS FRAMEWORK
        ========================================================================== */
        .bubble-wrapper {
            display: flex;
            width: 100%;
            flex-direction: column;
        }

        .bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.55;
            font-size: 15px;
            word-wrap: break-word;
        }

        .user-wrapper { align-items: flex-end; }
        .user {
            background: #2563eb;
            color: #ffffff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
        }

        .ai-wrapper { align-items: flex-start; }
        .ai {
            background: #111827;
            border: 1px solid #1f2937;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        /* MARKDOWN RENDER CONTEXTS */
        .ai-content p { margin-bottom: 10px; }
        .ai-content p:last-child { margin-bottom: 0; }
        .ai-content h3 { margin: 14px 0 6px; font-size: 16px; color: #38bdf8; }
        .ai-content b { color: #f59e0b; }
        .ai-content ul { padding-left: 20px; margin: 8px 0; }
        .ai-content li { margin-bottom: 4px; }

        /* TYPING INDICATOR */
        .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
        .typing-indicator span {
            width: 7px; height: 7px; background: #9ca3af; border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1.0); opacity: 1; }
        }

        /* ==========================================================================
        CONSOLIDATED FOOTER TERMINAL
        ========================================================================== */
        .footer-container {
            background: #111827;
            border-top: 1px solid #1f2937;
            padding: 12px 16px;
            flex-shrink: 0;
        }

        .input-area {
            display: flex;
            max-width: 760px;
            margin: 0 auto;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 24px;
            padding: 4px 6px 4px 14px;
            gap: 8px;
            align-items: center;
            transition: all 0.2s ease;
            width: 100%;
        }

        .input-area:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
            background: #111827;
        }

        #question {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: #f9fafb;
            font-size: 15px;
            outline: none;
            font-family: inherit;
            min-width: 0;
        }

        #question::placeholder {
            color: #6b7280;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 18px;
            background: #2563eb;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        button:hover { background: #1d4ed8; }
        button:active { transform: scale(0.96); }

        /* ==========================================================================
        SMALL SMARTPHONE MEDIA RESPONSIVENESS RULES
        ========================================================================== */
        @media (max-width: 480px) {
            .header { 
                padding: 16px 12px 12px 12px; 
            }
            .header-title { font-size: 14px; margin-right: 44px; }
            .back-arrow { padding: 5px 10px; font-size: 12px; }
            
            .bubble { max-width: 90%; font-size: 14px; padding: 10px 14px; }
            #chat-box { padding: 14px 10px; gap: 12px; }
            
            /* ⚡ FIXED FOR DOWNLOADED APP: Safe area padding fallback */
            .footer-container { 
                padding: 12px 12px calc(12px + env(safe-area-inset-bottom, 16px)) 12px; 
            } 
            
            .input-area { padding: 3px 4px 3px 10px; border-radius: 20px; }
            #question { font-size: 14px; padding: 8px 0; }
            button { padding: 8px 14px; font-size: 13px; border-radius: 16px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="top-nav">
        <a href="javascript:history.back()" class="back-arrow">←</a>
    </div>
    <div class="header-title">🤖 PetroAI Chat Terminal</div>
</div>

<div id="chat-box">
    <div class="bubble-wrapper ai-wrapper">
        <div class="bubble ai ai-content">
            <p>Hello 👋 I am PetroAI, your engineering tutor.</p>
        </div>
    </div>
</div>

<div class="footer-container">
    <div class="input-area">
        <input id="question" placeholder="Ask a question..." autocomplete="off" />
        <button onclick="askAI()">Send</button>
    </div>
</div>

<script>
// ADVANCED MARKDOWN PARSER FOR MODERN SAAS COMPLIANCE
function formatAI(text) {
    if (!text) return "";

    let cleanText = text.trim();
    
    // Convert Headers safely
    cleanText = cleanText.replace(/^### (.*?)(?:\n|$)/gm, "<h3>$1</h3>");
    
    // Convert Bold syntax
    cleanText = cleanText.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");
    
    // Process Bullet point lists cleanly
    let lines = cleanText.split('\n');
    let inList = false;
    let finalPayload = [];

    for (let i = 0; i < lines.length; i++) {
        let currentLine = lines[i].trim();
        
        if (currentLine.startsWith('- ')) {
            if (!inList) {
                finalPayload.push('<ul>');
                inList = true;
            }
            finalPayload.push(`<li>${currentLine.substring(2)}</li>`);
        } else {
            if (inList) {
                finalPayload.push('</ul>');
                inList = false;
            }
            // Group normal prose sentences directly inside native paragraph tags
            if (currentLine.length > 0 && !currentLine.startsWith('<h3')) {
                finalPayload.push(`<p>${currentLine}</p>`);
            } else {
                finalPayload.push(currentLine);
            }
        }
    }
    
    if (inList) {
        finalPayload.push('</ul>');
    }

    return finalPayload.join('\n');
}

async function askAI() {
    const input = document.getElementById("question");
    const question = input.value.trim();

    if (question === "") return;

    const chatBox = document.getElementById("chat-box");

    // RENDER USER PROMPT
    chatBox.innerHTML += `
        <div class="bubble-wrapper user-wrapper">
            <div class="bubble user">${question}</div>
        </div>
    `;
    input.value = "";

    // SETUP PREMIUM TYPING ACCENT PIPELINE
    const loadingId = "loading_" + Date.now();
    chatBox.innerHTML += `
        <div class="bubble-wrapper ai-wrapper" id="${loadingId}">
            <div class="bubble ai">
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    `;
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const res = await fetch("/ask_petroai", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ question: question })
        });
        
        const data = await res.json();
        
        const loader = document.getElementById(loadingId);
        if (loader) loader.remove();

        // INJECT RENDER DATA STRINGS CLEANLY
        chatBox.innerHTML += `
            <div class="bubble-wrapper ai-wrapper">
                <div class="bubble ai ai-content">
                    ${formatAI(data.answer)}
                </div>
            </div>
        `;
    } catch (err) {
        const loader = document.getElementById(loadingId);
        if (loader) loader.remove();

        chatBox.innerHTML += `
            <div class="bubble-wrapper ai-wrapper">
                <div class="bubble ai" style="color: #f87171; border-color: rgba(248, 113, 113, 0.2);">
                    ❌ Request connection timed out. Please verify data link signals.
                </div>
            </div>
        `;
    }
    
    chatBox.scrollTop = chatBox.scrollHeight;
}

// ATTACH EVENT LISTENER FOR PRESSING RETURN KEYS
document.getElementById("question").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        askAI();
    }
});
</script>
</body>
</html>
