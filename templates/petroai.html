<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PetroAI Chat Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* ==========================================================================
           1. CORE RESET & VARIABLE CONFIGURATION
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0b0f19;
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
        }

        /* ==========================================================================
           2. NAVIGATION HEADER
           ========================================================================== */
        .header {
            background: #111827;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.2px;
            border-bottom: 1px solid #1f2937;
            display: grid;
            grid-template-columns: 80px 1fr 80px; /* Forces mathematical centering for title */
            align-items: center;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            width: 100%;
        }

        .header-title {
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #fff;
        }

        .top-nav {
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .back-arrow {
            text-decoration: none;
            color: #9ca3af;
            font-size: 13px;
            font-weight: 500;
            background: #1f2937;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #374151;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
        }

        .back-arrow:active {
            color: #f3f4f6;
            background: #374151;
            border-color: #4b5563;
        }

        .new-chat-btn-wrapper {
            display: flex;
            justify-content: flex-end;
        }

        .new-chat-btn {
            background: #1f2937;
            color: #9ca3af;
            border: 1px solid #374151;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .new-chat-btn:active {
            color: #f3f4f6;
            background: #374151;
            border-color: #4b5563;
            transform: scale(0.95);
        }

        /* ==========================================================================
           3. STREAMING CHAT WORKSPACE
           ========================================================================== */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            scrollbar-width: thin;
            scrollbar-color: #2d3748 transparent;
        }

        #chat-box::-webkit-scrollbar {
            width: 4px;
        }
        #chat-box::-webkit-scrollbar-thumb {
            background: #2d3748;
            border-radius: 10px;
        }

        .bubble-wrapper {
            display: flex;
            width: 100%;
            flex-direction: column;
            margin-bottom: 4px;
        }

        .bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.55;
            font-size: 15px;
            word-wrap: break-word;
            position: relative;
        }

        .user-wrapper { align-items: flex-end; }
        .user {
            background: #2563eb;
            color: #ffffff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
        }

        .ai-wrapper { align-items: flex-start; }
        .ai {
            background: #111827;
            border: 1px solid #1f2937;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            width: 100%;
        }

        /* RENDERING MARKDOWN INTERIOR TARGETS */
        .ai-content p { margin-bottom: 10px; }
        .ai-content p:last-child { margin-bottom: 0; }
        .ai-content h3 { margin: 16px 0 8px; font-size: 16px; color: #38bdf8; font-weight: 700; }
        .ai-content b { color: #f59e0b; font-weight: 600; }
        .ai-content ul, .ai-content ol { padding-left: 20px; margin: 8px 0; }
        .ai-content li { margin-bottom: 6px; }
        .ai-content pre { background: #0f172a; padding: 12px; border-radius: 10px; overflow-x: auto; margin: 10px 0; border: 1px solid #1f2937; }
        .ai-content code { color: #38bdf8; font-family: monospace; font-size: 14px; }

        .copy-btn {
            display: block;
            margin-top: 10px;
            background: #1f2937;
            color: #9ca3af;
            border: 1px solid #374151;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            width: fit-content;
            transition: all 0.15s ease;
        }
        .copy-btn:active { background: #374151; color: #f3f4f6; }

        /* TYPING INDICATOR */
        .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 6px 0; }
        .typing-indicator span {
            width: 7px; height: 7px; background: #9ca3af; border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1.0); opacity: 1; }
        }

        /* ==========================================================================
           4. FOOTER & INPUT LAYOUT CONTEXT
           ========================================================================== */
        .footer-container {
            background: #111827;
            border-top: 1px solid #1f2937;
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .quick-prompts {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            max-width: 760px;
            width: 100%;
            margin: 0 auto;
            scrollbar-width: none;
        }
        .quick-prompts::-webkit-scrollbar { display: none; }

        .quick-prompts button {
            background: #1f2937;
            color: #9ca3af;
            border: 1px solid #374151;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .quick-prompts button:active {
            background: #2563eb;
            color: #ffffff;
            border-color: #2563eb;
        }

        .input-area {
            display: flex;
            max-width: 760px;
            margin: 0 auto;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 24px;
            padding: 4px 6px 4px 14px;
            gap: 8px;
            align-items: flex-end; /* Locks send button cleanly when field expands */
            transition: all 0.2s ease;
            width: 100%;
        }

        .input-area:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
            background: #111827;
        }

        #question {
            flex: 1;
            border: none;
            background: transparent;
            color: #f9fafb;
            font-size: 15px;
            outline: none;
            font-family: inherit;
            resize: none;
            min-width: 0;
            height: 24px; /* Default uniform spacing setup */
            max-height: 120px;
            line-height: 24px;
            padding: 6px 0;
        }

        #question::placeholder {
            color: #6b7280;
        }

        .send-btn {
            height: 36px;
            padding: 0 16px;
            border: none;
            border-radius: 18px;
            background: #2563eb;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .send-btn:hover { background: #1d4ed8; }
        .send-btn:active { transform: scale(0.96); }

        /* ==========================================================================
           5. MEDIA RESPONSIVENESS OVERRIDES
           ========================================================================== */
        @media (max-width: 480px) {
            .header { padding: 10px 12px; grid-template-columns: 60px 1fr 60px; }
            .header-title { font-size: 15px; }
            
            .bubble { max-width: 88%; font-size: 14px; padding: 10px 14px; }
            #chat-box { padding: 14px 12px; gap: 14px; }
            
            .footer-container { 
                padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 12px)) 12px; 
            }
            
            .input-area { padding: 4px 4px 4px 12px; border-radius: 22px; }
            #question { font-size: 14px; height: 22px; line-height: 22px; }
            
            /* Specific targets instead of broad 'button' selector to prevent breaks */
            .quick-prompts button { padding: 6px 12px; font-size: 12px; }
            .send-btn { height: 32px; padding: 0 14px; font-size: 13px; border-radius: 16px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="top-nav">
        <a href="javascript:history.back()" class="back-arrow">←</a>
    </div>
    <div class="header-title">🤖 PetroAI</div>
    <div class="new-chat-btn-wrapper">
        <button class="new-chat-btn" onclick="clearChat()">+</button>
    </div>
</div>

<div id="chat-box"></div>

<div class="footer-container">
    <div class="quick-prompts">
        <button onclick="quickAsk('Explain Darcy law')">Darcy Law</button>
        <button onclick="quickAsk('Explain drilling mud')">Drilling Mud</button>
        <button onclick="quickAsk('Reservoir pressure')">Reservoir</button>
    </div>
    
    <div class="input-area">
        <textarea id="question" rows="1" placeholder="Ask a question..."></textarea>
        <button class="send-btn" onclick="askAI()">Send</button>
    </div>
</div>

<script>
const chatBox = document.getElementById("chat-box");
const input = document.getElementById("question");

// UPGRADE: Professional & Friendly greeting
const welcomeMessage = `
    <div class="bubble-wrapper ai-wrapper">
        <div class="bubble ai ai-content">
            <p>Hi there! 👋 I'm PetroAI, your petroleum engineering assistant. Ask me anything about drilling mud, reservoir dynamics, or log analysis, and let's solve it together!</p>
            <button class="copy-btn" onclick="copyText(this)">Copy</button>
        </div>
    </div>
`;

// FIX: Auto-grow logic implementation for textarea resizing
input.addEventListener("input", function() {
    this.style.height = "24px"; 
    const basePadding = 12;
    this.style.height = (this.scrollHeight - basePadding) + "px";
});

document.addEventListener("DOMContentLoaded", () => {
    const savedChat = localStorage.getItem("petroai_chat");
    if (savedChat && savedChat.trim() !== "") {
        chatBox.innerHTML = savedChat;
    } else {
        chatBox.innerHTML = welcomeMessage;
    }
    chatBox.scrollTop = chatBox.scrollHeight;
});

function syncStorage() {
    localStorage.setItem("petroai_chat", chatBox.innerHTML);
}

function clearChat() {
    // UPGRADE: Descriptive workspace clear alert
    if(confirm("Are you sure you want to clear this chat? This will erase our current conversation history.")) {
        localStorage.removeItem("petroai_chat");
        chatBox.innerHTML = welcomeMessage;
    }
}

function copyText(buttonElement) {
    const bubbleContent = buttonElement.parentElement.innerText.replace("Copy", "").trim();
    navigator.clipboard.writeText(bubbleContent).then(() => {
        const oldText = buttonElement.innerText;
        buttonElement.innerText = "Copied! ✓";
        setTimeout(() => { buttonElement.innerText = oldText; }, 2000);
    });
}

function quickAsk(promptText) {
    input.value = promptText;
    input.dispatchEvent(new Event('input')); // Recalculates input area height tracking
    input.focus();
}

function formatAI(text) {
    if (!text) return "";

    let cleanText = text.trim();
    cleanText = cleanText.replace(/^### (.*?)(?:\n|$)/gm, "<h3>$1</h3>");
    cleanText = cleanText.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");
    
    let lines = cleanText.split('\n');
    let inList = false;
    let finalPayload = [];

    for (let i = 0; i < lines.length; i++) {
        let currentLine = lines[i].trim();
        
        if (currentLine.startsWith('- ')) {
            if (!inList) {
                finalPayload.push('<ul>');
                inList = true;
            }
            finalPayload.push(`<li>${currentLine.substring(2)}</li>`);
        } else {
            if (inList) {
                finalPayload.push('</ul>');
                inList = false;
            }
            if (currentLine.length > 0 && !currentLine.startsWith('<h3') && !currentLine.startsWith('<pre')) {
                finalPayload.push(`<p>${currentLine}</p>`);
            } else {
                finalPayload.push(currentLine);
            }
        }
    }
    if (inList) finalPayload.push('</ul>');
    return finalPayload.join('\n');
}

async function askAI() {
    const question = input.value.trim();
    if (question === "") return;

    chatBox.innerHTML += `
        <div class="bubble-wrapper user-wrapper">
            <div class="bubble user">${question}</div>
        </div>
    `;
    input.value = "";
    input.style.height = "24px"; 
    syncStorage();

    const loadingId = "loading_" + Date.now();
    chatBox.innerHTML += `
        <div class="bubble-wrapper ai-wrapper" id="${loadingId}">
            <div class="bubble ai" style="padding-bottom: 12px; max-width: 80px;">
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    `;
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const res = await fetch("/ask_petroai", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: question })
        });
        
        const data = await res.json();
        const loader = document.getElementById(loadingId);
        if (loader) loader.remove();

        chatBox.innerHTML += `
            <div class="bubble-wrapper ai-wrapper">
                <div class="bubble ai ai-content">
                    ${formatAI(data.answer)}
                    <button class="copy-btn" onclick="copyText(this)">Copy</button>
                </div>
            </div>
        `;
        syncStorage();
    } catch (err) {
        const loader = document.getElementById(loadingId);
        if (loader) loader.remove();

        // UPGRADE: Friendly drop-out fallback text block
        chatBox.innerHTML += `
            <div class="bubble-wrapper ai-wrapper">
                <div class="bubble ai" style="color: #f87171; border-color: rgba(248, 113, 113, 0.2); padding-bottom: 12px;">
                    ⚠️ Connection lost. I couldn't reach the server. Please check your internet connection and try asking again!
                </div>
            </div>
        `;
    }
    chatBox.scrollTop = chatBox.scrollHeight;
}

input.addEventListener("keypress", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        askAI();
    }
});

input.addEventListener("focus", () => {
    setTimeout(() => {
        chatBox.scrollTop = chatBox.scrollHeight;
    }, 300);
});
</script>
</body>
</html>
