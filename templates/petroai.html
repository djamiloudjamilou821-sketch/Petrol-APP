<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PetroAI Chat Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* ==========================================================================
           CORE RESET & VARIABLE CONFIGURATION
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background: #0b0f19;
            color: #f1f5f9;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        /* ⚡ FIXES STANDALONE MOBILE CUT-OFFS: Masters absolute layout bounds safely */
        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            height: 100dvh;
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        /* ==========================================================================
           TOP METRIC NAVIGATION HEADER
           ========================================================================== */
        .header {
            background: #111827;
            padding: 14px 16px;
            display: grid;
            grid-template-columns: 80px 1fr 80px;
            align-items: center;
            border-bottom: 1px solid #1f2937;
            flex-shrink: 0;
            width: 100%;
        }

        .header-title {
            text-align: center;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: -0.2px;
        }

        .back-nav {
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .back-arrow {
            color: #9ca3af;
            text-decoration: none;
            padding: 6px 12px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .back-arrow:hover {
            color: #f3f4f6;
            background: #374151;
        }

        .action-nav {
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .new-chat-btn {
            background: #1f2937;
            color: #9ca3af;
            border: 1px solid #374151;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .new-chat-btn:hover {
            color: #f3f4f6;
            background: #374151;
        }

        /* ==========================================================================
           STREAMING CHAT WORKSPACE
           ========================================================================== */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            -webkit-overflow-scrolling: touch;
        }

        #chat-box::-webkit-scrollbar {
            width: 5px;
        }
        #chat-box::-webkit-scrollbar-thumb {
            background: #2d3748;
            border-radius: 10px;
        }

        /* ==========================================================================
           CHAT BUBBLES FRAMEWORK
           ========================================================================== */
        .bubble-wrapper {
            display: flex;
            width: 100%;
            margin-bottom: 2px;
        }

        .user-wrapper { justify-content: flex-end; }
        .ai-wrapper { justify-content: flex-start; }

        .bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.55;
            font-size: 15px;
            word-wrap: break-word;
        }

        .user {
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
        }

        .ai {
            background: #111827;
            border: 1px solid #1f2937;
            border-bottom-left-radius: 4px;
        }

        /* MARKDOWN DECORATOR TARGETS */
        .ai-content p { margin-bottom: 10px; }
        .ai-content p:last-child { margin-bottom: 0; }
        .ai-content h3 { margin: 14px 0 6px; font-size: 16px; color: #38bdf8; }
        .ai-content b { color: #f59e0b; }
        .ai-content ul { padding-left: 20px; margin: 8px 0; }
        .ai-content li { margin-bottom: 4px; }

        .copy-btn {
            display: block;
            margin-top: 10px;
            background: #1f2937;
            color: #9ca3af;
            border: 1px solid #374151;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            width: fit-content;
            transition: all 0.15s ease;
        }
        .copy-btn:hover { background: #374151; color: #f3f4f6; }

        /* TYPING INDICATOR LOADING COMPONENT */
        .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 6px 0; }
        .typing-indicator span {
            width: 8px; height: 8px; background: #9ca3af; border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1.0); opacity: 1; }
        }

        /* ==========================================================================
           CONSOLIDATED FOOTER TERMINAL
           ========================================================================== */
        .footer-container {
            background: #111827;
            padding: 12px 16px;
            border-top: 1px solid #1f2937;
            flex-shrink: 0;
            width: 100%;
        }

        .input-area {
            display: flex;
            max-width: 760px;
            margin: 0 auto;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 24px;
            padding: 5px 6px 5px 14px;
            gap: 10px;
            align-items: flex-end; /* Keeps send button pinned nicely at bottom edge */
            transition: all 0.2s ease;
        }

        .input-area:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
            background: #111827;
        }

        #question {
            flex: 1;
            background: transparent;
            border: none;
            color: #f9fafb;
            outline: none;
            resize: none;
            font-family: inherit;
            font-size: 15px;
            padding: 8px 0;
            min-height: 24px;
            max-height: 120px; /* Limits expansion bounds smoothly */
            line-height: 1.4;
        }

        #question::placeholder {
            color: #6b7280;
        }

        .send-btn {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 18px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-btn:hover { background: #1d4ed8; }
        .send-btn:active { transform: scale(0.96); }

        /* ==========================================================================
           SMALL SMARTPHONE MEDIA RESPONSIVENESS RULES
           ========================================================================== */
        @media (max-width: 480px) {
            .header { padding: 12px 12px; }
            .bubble { max-width: 90%; font-size: 14px; }
            #chat-box { padding: 14px 10px; }
            
            /* ⚡ KEY FIX FOR STANDALONE DOWNLOADED MODE: Forces native OS spacing fallback safety offset */
            .footer-container { 
                padding: 12px 12px calc(12px + env(safe-area-inset-bottom, 12px)) 12px; 
            }
        }
    </style>
</head>

<body>

<div class="app-container">

    <div class="header">
        <div class="back-nav">
            <a class="back-arrow" href="javascript:history.back()">←</a>
        </div>
        <div class="header-title">🤖 PetroAI</div>
        <div class="action-nav">
            <button class="new-chat-btn" onclick="clearChat()">+</button>
        </div>
    </div>

    <div id="chat-box"></div>

    <div class="footer-container">
        <div class="input-area">
            <textarea id="question" rows="1" placeholder="Ask a question..." autocomplete="off"></textarea>
            <button class="send-btn" onclick="askAI()">Send</button>
        </div>
    </div>

</div>

<script>
const chatBox = document.getElementById("chat-box");
const input = document.getElementById("question");

let isLoading = false;

// Automatically handles flexible layout growth heights for textareas
input.addEventListener("input", function() {
    this.style.height = "auto";
    this.style.height = this.scrollHeight + "px";
});

function escapeHTML(str) {
    return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function formatAI(text) {
    if (!text) return "";

    let clean = escapeHTML(text.trim());

    clean = clean.replace(/^### (.*?)(?:\n|$)/gm, "<h3>$1</h3>");
    clean = clean.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");

    let lines = clean.split("\n");
    let out = [];
    let inList = false;

    for (let line of lines) {
        line = line.trim();

        if (line.startsWith("- ")) {
            if (!inList) {
                out.push("<ul>");
                inList = true;
            }
            out.push(`<li>${line.slice(2)}</li>`);
        } else {
            if (inList) {
                out.push("</ul>");
                inList = false;
            }
            if (line) out.push(`<p>${line}</p>`);
        }
    }

    if (inList) out.push("</ul>");

    return out.join("");
}

function syncStorage() {
    localStorage.setItem("petroai_chat", chatBox.innerHTML);
}

function clearChat() {
    if (confirm("Clear conversation history?")) {
        localStorage.removeItem("petroai_chat");
        chatBox.innerHTML = `
            <div class="bubble-wrapper ai-wrapper">
                <div class="bubble ai ai-content">
                    <p>Hello 👋 I am PetroAI, your engineering tutor.</p>
                </div>
            </div>
        `;
        syncStorage();
    }
}

async function askAI() {
    if (isLoading) return;

    const question = input.value.trim();
    if (!question) return;

    isLoading = true;

    chatBox.insertAdjacentHTML("beforeend", `
        <div class="bubble-wrapper user-wrapper">
            <div class="bubble user">${escapeHTML(question)}</div>
        </div>
    `);

    input.value = "";
    input.style.height = "auto"; // Snap container back to initial single-row grid scale

    const loadingId = "load_" + Date.now();

    // Renders pulse animations instead of plain text strings
    chatBox.insertAdjacentHTML("beforeend", `
        <div class="bubble-wrapper ai-wrapper" id="${loadingId}">
            <div class="bubble ai">
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    `);
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const res = await fetch("/ask_petroai", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ question })
        });

        const data = await res.json();

        document.getElementById(loadingId)?.remove();

        chatBox.insertAdjacentHTML("beforeend", `
            <div class="bubble-wrapper ai-wrapper">
                <div class="bubble ai ai-content">
                    ${formatAI(data.answer)}
                    <button class="copy-btn" onclick="copyText(this)">Copy</button>
                </div>
            </div>
        `);

        syncStorage();

    } catch (e) {
        document.getElementById(loadingId)?.remove();

        chatBox.insertAdjacentHTML("beforeend", `
            <div class="bubble-wrapper ai-wrapper">
                <div class="bubble ai" style="color: #f87171; border-color: rgba(248, 113, 113, 0.2);">
                    ⚠️ Connection error. Try again.
                </div>
            </div>
        `);
    }

    isLoading = false;
    chatBox.scrollTop = chatBox.scrollHeight;
}

function copyText(btn) {
    const rawText = btn.parentElement.innerText;
    // Clears out helper copy strings from clips safely
    const cleanText = rawText.substring(0, rawText.lastIndexOf("Copy")).trim();
    navigator.clipboard.writeText(cleanText).then(() => {
        const originalText = btn.innerText;
        btn.innerText = "Copied! ✓";
        setTimeout(() => { btn.innerText = originalText; }, 2000);
    });
}

input.addEventListener("keypress", e => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        askAI();
    }
});

window.onload = () => {
    const saved = localStorage.getItem("petroai_chat");
    if (saved && saved.trim() !== "") {
        chatBox.innerHTML = saved;
    } else {
        chatBox.innerHTML = `
            <div class="bubble-wrapper ai-wrapper">
                <div class="bubble ai ai-content">
                    <p>Hello 👋 I am PetroAI, your engineering tutor.</p>
                </div>
            </div>
        `;
    }
    chatBox.scrollTop = chatBox.scrollHeight;
};
</script>

</body>
</html>
