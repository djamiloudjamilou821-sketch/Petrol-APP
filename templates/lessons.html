<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Petroleum Engineering Lessons</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* =========================
           CORE RESET & VARIABLES
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.93)), url("/static/hb.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f8fafc;
            min-height: 100vh;
            padding-bottom: 40px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 92%;
            max-width: 900px;
            margin: 0 auto;
            padding-top: 24px;
        }

        /* =========================
           NAVIGATION BAR ARCHITECTURE
        ========================= */
        .top-nav {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
            position: relative;
        }

        .back-arrow {
            text-decoration: none;
            color: #94a3b8;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }

        .back-arrow:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* =========================
           HERO HEADER COMPONENT
        ========================= */
        .top-bar {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            padding: 24px 20px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            color: #ffffff;
        }

        p {
            color: #94a3b8;
            font-size: 14px;
        }

        /* =========================
           SEARCH BAR COMPONENT
        ========================= */
        .search-container {
            margin-bottom: 24px;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            font-size: 15px;
            font-family: inherit;
            color: white;
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            backdrop-filter: blur(8px);
            outline: none;
            transition: all 0.25s ease;
        }

        .search-input:focus {
            border-color: #38bdf8;
            background: rgba(30, 41, 59, 0.6);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.15);
        }

        .search-input::placeholder {
            color: #64748b;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
            font-size: 15px;
            display: none;
        }

        /* =========================
           LESSONS INTERACTIVE GRID
        ========================= */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }

        a.lesson-link {
            text-decoration: none;
            color: inherit;
            outline: none;
            transition: opacity 0.2s ease;
        }

        .card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            padding: 20px;
            border-radius: 14px;
            text-align: left;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-2px);
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.05);
        }

        .title {
            font-size: 16px;
            font-weight: 600;
            color: #38bdf8;
            line-height: 1.4;
        }

        .desc {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card:hover .desc {
            color: #38bdf8;
        }

        /* =========================
           RESPONSIVE TUNING
        ========================= */
        @media (max-width: 600px) {
            .container {
                padding-top: 16px;
            }
            .top-bar {
                padding: 20px 16px;
            }
            h1 {
                font-size: 20px;
            }
            p {
                font-size: 13px;
            }
            .grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .search-input {
                padding: 12px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-nav">
        <a href="javascript:history.back()" class="back-arrow">⬅</a>
    </div>

    <div class="top-bar">
        <h1>📚 Petroleum Engineering Lessons</h1>
        <p>Learn the fundamentals of oil & gas engineering step by step</p>
    </div>

    <div class="search-container">
        <input 
            type="text" 
            id="lessonSearch" 
            class="search-input" 
            placeholder="🔍 Search specific lessons (e.g., Reservoir, Drilling, Porosity)..." 
            onkeyup="filterLessons()"
        >
    </div>

    <div class="grid" id="lessonsGrid">
        {% for lesson in lessons %}
        <a href="/lesson/{{ lesson.id }}" class="lesson-link">
            <div class="card">
                <div class="title">📘 {{ lesson.title }}</div>
                <div class="desc">
                    <span>Open lesson modules</span> →
                </div>
            </div>
        </a>
        {% endfor %}
    </div>

    <div id="noResults" class="no-results">
        No engineering lessons match your search terms.
    </div>
</div>

<script>
function filterLessons() {
    // Get search text data and clean up whitespace case matching
    const query = document.getElementById("lessonSearch").value.toLowerCase().trim();
    const gridItems = document.querySelectorAll("#lessonsGrid .lesson-link");
    let hasMatches = false;

    gridItems.forEach(item => {
        // Targets the text inside the .title element of the card
        const titleText = item.querySelector(".title").textContent.toLowerCase();
        
        if (titleText.includes(query)) {
            item.style.display = ""; // Shows item
            hasMatches = true;
        } else {
            item.style.display = "none"; // Hides item
        }
    });

    // Handle feedback if user inputs terms that yield empty results
    const noResultsDiv = document.getElementById("noResults");
    if (hasMatches) {
        noResultsDiv.style.display = "none";
    } else {
        noResultsDiv.style.display = "block";
    }
}
</script>

</body>
</html>
