<!DOCTYPE html>
<html>
<head>
    <title>Petroleum Engineering Lessons</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(rgba(15,23,42,0.85), rgba(15,23,42,0.85)),
                url("/static/hb.jpg");

            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }

        .container {
            width: 92%;
            max-width: 900px;
            margin: auto;
            margin-top: 30px;
        }

        h1 {
            margin-bottom: 5px;
        }

        p {
            color: #cbd5e1;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            text-align: left;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.03);
            background: #273449;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            color: #38bdf8;
        }

        .desc {
            font-size: 13px;
            color: #cbd5e1;
            margin-top: 8px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .top-bar {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }


    </style>
</head>

<body>

<div class="container">
    <div class="top-nav">
        <a href="javascript:history.back()" class="back-arrow">
            ⬅
        </a>
    </div>


    <div class="top-bar">
        <h1>📚 Petroleum Engineering Lessons</h1>
        <p>Learn the fundamentals of oil & gas engineering step by step</p>
    </div>

    <div class="grid">

    {% for lesson in lessons %}

    <a href="/lesson/{{ lesson.id }}">
        <div class="card">
            <div class="title">📘 {{ lesson.title }}</div>
            <div class="desc">
                Click to open lesson
            </div>
        </div>
    </a>

    {% endfor %}

</div>

</div>

</body>
</html>
