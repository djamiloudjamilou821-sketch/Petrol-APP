<!DOCTYPE html>
<html>
<head>
    <title>Pressure Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 500px;
            margin: auto;
            margin-top: 40px;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            border: none;
            border-radius: 8px;
            color: white;
        }

        .result {
            margin-top: 15px;
            color: #38bdf8;
        }

        a {
            display: block;
            margin-top: 15px;
            color: white;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🌊 Pressure</h2>
    <p>P = ρgh</p>

    <form method="POST">
        <input name="rho" placeholder="Density (ρ)" required>
        <input name="g" placeholder="Gravity (g)" required>
        <input name="h" placeholder="Height (h)" required>
        <button type="submit">Calculate</button>
    </form>

    {% if result is not none %}
        <div class="result">Result: {{ result }}</div>
    {% endif %}

    <a href="/formulas">⬅ Back</a>
</div>

</body>
</html>
