<!DOCTYPE html>
<html>
<head>
    <title>Petroleum Converter</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 550px;
            margin: auto;
            margin-top: 40px;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }

        h2 {
            margin-bottom: 5px;
        }

        p {
            font-size: 14px;
            color: #cbd5e1;
        }

        select, input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #1d4ed8;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            color: #38bdf8;
        }

        .card {
            margin-top: 15px;
            padding: 10px;
            background: #0f172a;
            border-radius: 8px;
        }

        a {
            display: block;
            margin-top: 15px;
            color: white;
            text-decoration: none;
        }

        a:hover {
            color: #38bdf8;
        }

        .back-arrow{
            text-decoration:none;
            color:white;
            font-size:22px;
            font-weight:bold;

            width:40px;
            height:40px;

            display:flex;
            align-items:center;
            justify-content:center;

            border-radius:10px;
            transition:0.2s;
        }

        .back-arrow:hover{
            background:#1e293b;
        }

    </style>
</head>

<body>

<div class="container">
    <a href="/" class="back-arrow">⬅</a>

    <h2>🛠️ Petroleum Converter</h2>

    <p>Convert oil, gas, pressure and engineering units easily</p>

    <form method="POST">

        <!-- VALUE INPUT -->
        <input name="value" type="number" step="any" placeholder="Enter value" required>

        <!-- CONVERSION TYPE -->
        <select name="conversion" required>
            <option value="">-- Select Conversion --</option>

            <optgroup label="🌍 Length">
                <option value="m_to_ft">Meters → Feet</option>
                <option value="ft_to_m">Feet → Meters</option>
            </optgroup>

            <optgroup label="⚖️ Pressure">
                <option value="psi_to_bar">PSI → Bar</option>
                <option value="bar_to_psi">Bar → PSI</option>
            </optgroup>

            <optgroup label="🛢️ Oil & Gas Volume">
                <option value="bbl_to_l">Barrel → Liters</option>
                <option value="l_to_bbl">Liters → Barrels</option>
                <option value="bbl_to_m3">Barrel → m³</option>
                <option value="m3_to_bbl">m³ → Barrel</option>
                <option value="l_to_m3">Liters → m³</option>
                <option value="m3_to_l">m³ → Liters</option>
            </optgroup>

        </select>

        <button type="submit">Convert</button>

    </form>

    {% if result is not none %}
        <div class="card">
            <div class="result">
                Result: {{ result }}
            </div>
        </div>
    {% endif %}

    
</div>

</body>
</html>
