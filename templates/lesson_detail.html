<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ lesson.title }} - PetroApp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* =========================
           CORE RESET & VARIABLES
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.93)), url("/static/hb.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f8fafc;
            min-height: 100vh;
            padding-bottom: 60px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 92%;
            max-width: 860px;
            margin: 0 auto;
            padding-top: 24px;
        }

        /* =========================
           NAVIGATION BAR ARCHITECTURE
        ========================= */
        .top-nav {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }

        .back-arrow {
            text-decoration: none;
            color: #94a3b8;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }

        .back-arrow:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* =========================
           HEADER & STATUS MONITOR
        ========================= */
        .header {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            padding: 28px 24px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #ffffff;
            line-height: 1.3;
        }

        .lesson-info {
            margin-top: 10px;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .progress-bar {
            margin-top: 20px;
            width: 100%;
            height: 6px;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress {
            width: 100%;
            height: 100%;
            background: #10b981;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
        }

        /* =========================
           MEDIA VIEWPORT PLATFORM
        ========================= */
        .video-box {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            border-radius: 10px;
            display: block;
        }

        /* =========================
           CORE TECHNICAL LEAF CARD
        ========================= */
        .content-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 32px 28px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .content-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 18px;
            color: #38bdf8;
            letter-spacing: -0.3px;
        }

        .content {
            color: #cbd5e1;
            line-height: 1.85;
            font-size: 15px;
            white-space: pre-line;
        }

        /* =========================
           INTERACTION ACTIONS GATEWAY
        ========================= */
        .lesson-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .action-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 14px 24px;
            text-decoration: none;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }

        .ask-btn {
            background: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .ask-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.35);
        }

        .action-btn:active {
            transform: scale(0.99);
        }

        /* =========================
           RESPONSIVE RE-PROPORTIONS
        ========================= */
        @media (max-width: 600px) {
            .container {
                padding-top: 16px;
            }

            .header {
                padding: 24px 16px;
            }

            .header h1 {
                font-size: 20px;
            }

            .content-card {
                padding: 24px 18px;
            }

            .content {
                font-size: 14px;
                line-height: 1.75;
            }

            .action-btn {
                font-size: 14px;
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-nav">
        <a href="javascript:history.back()" class="back-arrow">⬅</a>
    </div>

    <div class="header">
        <h1 id="lesson-title">🎥 {{ lesson.title }}</h1>
        <div class="lesson-info">
            📚 Module • 🎓 Petroleum Engineering
        </div>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
    </div>

    <div class="video-box">
        <iframe src="{{ lesson.video }}" allowfullscreen></iframe>
    </div>

    <div class="content-card">
        <div class="content-title">Lesson Overview</div>
        <div class="content" id="lesson-content">{{ lesson.content }}</div>
    </div>

    <div class="lesson-actions">
        <button class="action-btn ask-btn" onclick="askPetroAI()">
            🤖 Ask PetroAI About This Lesson
        </button>
    </div>
</div>

<script>
function askPetroAI() {
    const title = document.getElementById("lesson-title").innerText;
    sessionStorage.setItem("lesson_title", title);
    window.location.href = "/petroai";
}

function sendToPetroAI() {
    const title = document.getElementById("lesson-title").innerText;
    const content = document.getElementById("lesson-content").innerText;

    sessionStorage.setItem("lesson_title", title);
    sessionStorage.setItem("lesson_content", content);
    sessionStorage.setItem("generate_quiz", "true");

    window.location.href = "/petroai";
}
</script>
</body>
</html>
