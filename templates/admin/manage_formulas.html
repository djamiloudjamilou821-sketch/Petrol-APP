<!DOCTYPE html>
<html>
<head>
    <title>Manage Formulas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .container {
            width: 92%;
            max-width: 1000px;
            margin: auto;
            margin-top: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
        }

        p {
            text-align: center;
            color: #cbd5e1;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.02);
            background: #273449;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            color: #38bdf8;
        }

        .formula {
            color: #fbbf24;
            margin: 8px 0;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        .btn {
            padding: 8px 12px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            color: white;
        }

        .edit {
            background: #2563eb;
        }

        .delete {
            background: #ef4444;
        }

        .top-btn {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #38bdf8;
            text-decoration: none;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>🧮 Manage Formulas</h1>
    <p>Edit or delete engineering formulas</p>

    <div class="grid">

        {% for f in formulas %}

        <div class="card">

            <div class="title">{{ f.name }}</div>

            <div class="formula">{{ f.formula }}</div>

            <p style="color:#cbd5e1; font-size:13px;">
                {{ f.desc }}
            </p>

            <div class="actions">

                <a class="btn edit" href="/admin/edit-formula/{{ f.id }}">
                    ✏ Edit
                </a>

                <a class="btn delete"
                   href="/admin/delete-formula/{{ f.id }}"
                   onclick="return confirm('⚠ Are you sure you want to delete this formula?')">
                    🗑 Delete
                </a>

            </div>

        </div>

        {% endfor %}

    </div>

    <a class="top-btn" href="/admin">⬅ Back to Admin</a>

</div>

</body>
</html>
