<!DOCTYPE html>
<html>
<head>
    <title>Add Lesson</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .container {
            width: 92%;
            max-width: 700px;
            margin: auto;
            margin-top: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: #cbd5e1;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-size: 14px;
            color: #cbd5e1;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #0f172a;
            color: white;
        }

        textarea {
            height: 150px;
            resize: none;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #2563eb;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #38bdf8;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📘 Add New Lesson</h1>
    <p>Create a new petroleum engineering lesson</p>

    <div class="card">

        <form method="POST">

            <label>Lesson Title</label>
            <input type="text" name="title" required>

            <label>YouTube Video URL (embed link)</label>
            <input type="text" name="video" placeholder="https://www.youtube.com/embed/..." required>

            <label>Lesson Content</label>
            <textarea name="content" required></textarea>

            <button type="submit">➕ Add Lesson</button>

        </form>

    </div>

    <a class="back" href="/admin">⬅ Back to Admin</a>

</div>

</body>
</html>
