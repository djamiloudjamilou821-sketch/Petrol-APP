<!DOCTYPE html>
<html>
<head>
    <title>Manage Posts</title>
</head>
<body>

<h1>Community Posts</h1>

{% for post in posts %}

<div style="border:1px solid gray; padding:15px; margin:15px;">

    <h3>{{ post.user.username }}</h3>

    <p>{{ post.content }}</p>

    {% if post.image %}
        <img src="{{ post.image }}" width="250">
    {% endif %}

    <br><br>

    <form action="/admin/delete-post/{{ post.id }}" method="POST"
          onsubmit="return confirm('Delete this post?')">

        <button type="submit">
            Delete Post
        </button>

    </form>

    <h4>Comments</h4>

    {% for comment in post.comments %}

        <p>
            <strong>{{ comment.user.username }}</strong> :
            {{ comment.content }}
        </p>

        <form action="/admin/delete-comment/{{ comment.id }}" method="POST"
              onsubmit="return confirm('Delete this comment?')">

            <button type="submit">
                Delete Comment
            </button>

        </form>

    {% endfor %}

</div>

{% endfor %}

</body>
</html>
