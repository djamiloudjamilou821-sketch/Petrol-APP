<!DOCTYPE html>
<html>
<head>
    <title>Edit Formula</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#0f172a;
            color:white;
        }

        .topbar{
            background:#020617;
            padding:18px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
            position:sticky;
            top:0;
        }

        .container{
            width:92%;
            max-width:800px;
            margin:auto;
            padding:30px 0;
        }

        .card{
            background:#1e293b;
            padding:30px;
            border-radius:20px;
        }

        h1{
            margin-top:0;
            text-align:center;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#cbd5e1;
            margin-bottom:30px;
        }

        label{
            display:block;
            margin-top:18px;
            margin-bottom:8px;
            color:#cbd5e1;
            font-size:14px;
        }

        input,
        textarea,
        select{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#0f172a;
            color:white;
            font-size:15px;
            outline:none;
        }

        textarea{
            min-height:120px;
            resize:vertical;
        }

        .btn{
            width:100%;
            margin-top:30px;
            padding:15px;
            border:none;
            border-radius:14px;
            background:#f59e0b;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#d97706;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:25px;
            color:#38bdf8;
            text-decoration:none;
        }

    </style>
</head>

<body>

<div class="topbar">
    ✏️ Edit Formula
</div>

<div class="container">

    <div class="card">

        <h1>Edit Engineering Formula</h1>

        <div class="subtitle">
            Update your petroleum engineering calculator dynamically
        </div>

        <form method="POST">

            <label>Formula Name</label>
            <input
                type="text"
                name="name"
                value="{{ formula.name }}"
                required
            >

            <label>Equation</label>
            <input
                type="text"
                name="equation"
                value="{{ formula.equation }}"
                required
            >

            <label>Description</label>

            <textarea
                name="description"
                required
            >{{ formula.description }}</textarea>

            <label>Category</label>

            <select name="category">

                <option value="{{ formula.category }}">
                    {{ formula.category }}
                </option>

                <option value="Reservoir">
                    Reservoir Engineering
                </option>

                <option value="Drilling">
                    Drilling Engineering
                </option>

                <option value="Production">
                    Production Engineering
                </option>

                <option value="Fluid Mechanics">
                    Fluid Mechanics
                </option>

                <option value="Pressure Analysis">
                    Pressure Analysis
                </option>

                <option value="General">
                    General Engineering
                </option>

            </select>

            <label>Variables</label>

            <textarea
                name="variables"
            >{{ formula.variables }}</textarea>

            <label>Python Formula</label>

            <textarea
                name="python_formula"
                required
            >{{ formula.python_formula }}</textarea>

            <button class="btn" type="submit">
                💾 Update Formula
            </button>

        </form>

    </div>

    <a href="/admin/manage-formulas" class="back">
        ⬅ Back to Manage Formulas
    </a>

</div>

</body>
</html>
</html>
