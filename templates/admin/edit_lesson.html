<!DOCTYPE html>
<html>
<head>
    <title>Edit Lesson</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .container {
            width: 92%;
            max-width: 750px;
            margin: auto;
            margin-top: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
        }

        p {
            text-align: center;
            color: #cbd5e1;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }

        label {
            display: block;
            margin-top: 12px;
            font-size: 14px;
            color: #cbd5e1;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #0f172a;
            color: white;
            font-size: 14px;
        }

        textarea {
            height: 220px;
            resize: none;
        }

        .btn {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #f59e0b;
            border: none;
            border-radius: 8px;
            color: black;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:hover {
            background: #d97706;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #38bdf8;
            text-decoration: none;
        }

        .preview {
            margin-top: 20px;
            padding: 15px;
            background: #0f172a;
            border-radius: 10px;
            border: 1px solid #334155;
        }

        .preview h3 {
            margin: 0;
            color: #38bdf8;
        }

        .preview iframe {
            width: 100%;
            height: 200px;
            margin-top: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>✏️ Edit Lesson</h1>
    <p>Update lesson content, video, or title</p>

    <div class="card">

        <form method="POST">

            <!-- TITLE -->
            <label>Lesson Title</label>
            <input type="text" name="title" value="{{ lesson.title }}" required>

            <!-- VIDEO -->
            <label>YouTube Embed Link</label>
            <input type="text" name="video" value="{{ lesson.video }}" required>

            <!-- CONTENT -->
            <label>Lesson Content</label>
            <textarea name="content" required>{{ lesson.content }}</textarea>

            <!-- SUBMIT -->
            <button class="btn" type="submit">💾 Save Changes</button>

        </form>

        <!-- PREVIEW -->
        <div class="preview">
            <h3>👀 Preview Video</h3>
            <iframe src="{{ lesson.video }}" frameborder="0" allowfullscreen></iframe>
        </div>

    </div>

    <a class="back" href="/admin">⬅ Back to Admin</a>

</div>

</body>
</html>
