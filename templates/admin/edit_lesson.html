<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Lesson Configuration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        /* ==========================================================================
           1. CORE RESET & SAFARI ZOOM PREVENTION
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
            padding: 24px 16px calc(32px + env(safe-area-inset-bottom, 0px)) 16px;
        }

        /* ==========================================================================
           2. TYPOGRAPHY HEADER STYLES
           ========================================================================== */
        .page-header {
            text-align: center;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            color: #ffffff;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.5;
        }

        /* ==========================================================================
           3. CENTRAL CONTENT BLOCK
           ========================================================================== */
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #cbd5e1;
            letter-spacing: 0.2px;
        }

        /* ⚡ FIX: Setting font-size to 16px safely bypasses iOS PWA browser auto-zooming */
        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #ffffff;
            font-size: 16px; 
            font-family: inherit;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus, textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            background: #090d16;
        }

        textarea {
            min-height: 180px;
            max-height: 350px;
            resize: vertical; /* Safe workspace manual scaling adjustment toggles */
            line-height: 1.6;
        }

        /* ==========================================================================
           4. PERSISTENT VIDEO ASPECT BOX RATIO
           ========================================================================== */
        .preview-box {
            background: #0f172a;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .preview-box h3 {
            font-size: 13px;
            font-weight: 700;
            color: #38bdf8;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* ⚡ FIX: Flexible 16:9 widescreen wrapper blocks viewport stretching */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Mathematical formula constraints for 16:9 ratio */
            height: 0;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* ==========================================================================
           5. INTERACTION SUBMIT BUTTONS
           ========================================================================== */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #f59e0b;
            border: none;
            border-radius: 12px;
            color: #0f172a;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.15);
        }

        .btn-submit:active {
            transform: scale(0.98);
            background: #d97706;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-top: 16px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.15s ease;
        }

        .back-link:active {
            color: #38bdf8;
        }

        /* ==========================================================================
           6. ULTRA NARROW PHONE OVERRIDES
           ========================================================================== */
        @media (max-width: 480px) {
            .container { padding: 16px 12px; }
            h1 { font-size: 19px; }
            .card { padding: 16px; gap: 16px; }
            input, textarea { font-size: 16px; padding: 10px; } /* Force continuous 16px */
        }
    </style>
</head>
<body>

<div class="container">

    <div class="page-header">
        <h1>✏️ Edit Lesson</h1>
        <p class="subtitle">Modify engineering course lecture parameters and adjust embedded video links</p>
    </div>

    <div class="card">
        <form method="POST">
            <div class="form-group">
                <label for="title">Lesson Title</label>
                <input type="text" id="title" name="title" value="{{ lesson.title }}" placeholder="e.g., Introduction to Darcy's Law" required>
            </div>

            <div class="form-group">
                <label for="video">YouTube Embed Link</label>
                <input type="url" id="video" name="video" value="{{ lesson.video }}" placeholder="https://www.youtube.com/embed/..." required>
            </div>

            <div class="form-group">
                <label for="content">Lesson Content</label>
                <textarea id="content" name="content" placeholder="Write comprehensive lecture instructions or markdown notes here..." required>{{ lesson.content }}</textarea>
            </div>

            <button class="btn-submit" type="submit">💾 Save Changes</button>
        </form>

        <div class="preview-box">
            <h3>👀 Video Feed Preview</h3>
            <div class="video-wrapper">
                <iframe id="video-preview" src="{{ lesson.video }}" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <a class="back-link" href="/admin">← Cancel & Return to Dashboard</a>

</div>

<script>
    // Live update preview frame when link string gets edited in real-time
    const videoInput = document.getElementById('video');
    const previewFrame = document.getElementById('video-preview');

    videoInput.addEventListener('input', (e) => {
        const val = e.target.value.trim();
        if (val.startsWith('http://') || val.startsWith('https://')) {
            previewFrame.src = val;
        }
    });
</script>
</body>
</html>
