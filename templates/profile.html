<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Arial;
            background: linear-gradient(rgba(15,23,42,0.85), rgba(15,23,42,0.85)),
                        url("/static/hb.jpg");
            background-size: cover;
            background-position: center;
            color: white;
        }

        .container {
            width: 92%;
            max-width: 420px;
            margin: auto;
            padding-top: 60px;
        }

        /* BACK BUTTON */
        .back-arrow {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: #1e293b;
            color: white;
            text-decoration: none;
            font-size: 20px;
            transition: 0.2s;
        }

        .back-arrow:active {
            transform: scale(0.95);
        }

        /* CARD */
        .card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* PROFILE IMAGE */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #38bdf8;
            margin-bottom: 10px;
        }

        h1 {
            margin: 10px 0 5px;
            font-size: 22px;
        }

        p {
            margin: 6px 0;
            color: #cbd5e1;
            font-size: 14px;
        }

        .info {
            margin-top: 15px;
            text-align: left;
            background: rgba(15, 23, 42, 0.6);
            padding: 12px;
            border-radius: 12px;
        }

        .btn {
            display: inline-block;
            margin-top: 18px;
            padding: 12px 18px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;

            /* FIX HERE */
            width: auto;
            min-width: 140px;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* MOBILE */
        @media (max-width: 500px) {
            .container {
                padding-top: 70px;
            }

            .card {
                padding: 18px;
            }

            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

<a href="/" class="back-arrow">⬅</a>

<div class="container">
    <div class="card">

        <!-- SAFE IMAGE -->
        {% if user.profile_pic %}
            <img class="profile-img" src="{{ user.profile_pic }}">
        {% else %}
            <img class="profile-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        {% endif %}

        <h1>{{ user.username }}</h1>
        <p>{{ user.email }}</p>

        <div class="info">
            <p>📝 {{ user.bio or "No bio yet" }}</p>
            <p>🌍 {{ user.country or "Not set" }}</p>
            <p>🏫 {{ user.university or "Not set" }}</p>
            <p>🛢️ {{ user.petroleum_level or "Not set" }}</p>
        </div>

        <a href="/edit-profile" class="btn">Edit Profile</a>

    </div>
</div>

</body>
</html>
