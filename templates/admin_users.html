<!DOCTYPE html>
<html>
<head>
    <title>Users</title>
</head>
<body>

<h1>All Users</h1>

<table border="1">

<tr>
    <th>ID</th>
    <th>Username</th>
    <th>Email</th>
    <th>Country</th>
</tr>

{% for user in users %}

<tr>
    <td>{{ user.id }}</td>
    <td>{{ user.username }}</td>
    <td>{{ user.email }}</td>
    <td>{{ user.country }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
