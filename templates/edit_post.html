<!DOCTYPE html>
<html>
<head>
    <title>Edit Post</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
            background:#0b1220;
            color:white;
            min-height:100vh;
        }

        .container{
            width:92%;
            max-width:650px;
            margin:auto;
            padding:20px 15px 40px;
        }

        /* HEADER */

        .top-nav{
            display:flex;
            align-items:center;
            margin-bottom:20px;
        }

        .back-arrow{
            width:42px;
            height:42px;
            display:flex;
            align-items:center;
            justify-content:center;
            text-decoration:none;
            border-radius:12px;
            background:#111827;
            color:white;
            font-size:22px;
            transition:0.2s;
        }

        .back-arrow:hover{
            background:#1f2937;
        }

        .back-arrow:active{
            transform:scale(0.95);
        }

        h1{
            margin-top:15px;
            margin-bottom:20px;
            color:#38bdf8;
            font-size:24px;
            font-weight:700;
        }

        /* CARD */

        .card{
            background:#111827;
            border-radius:20px;
            padding:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.25);
        }

        /* TEXTAREA */

        textarea{
            width:100%;
            min-height:180px;
            padding:15px;
            border:none;
            border-radius:14px;
            background:#0b1220;
            color:white;
            font-size:15px;
            line-height:1.6;
            resize:vertical;
            outline:none;
        }

        textarea:focus{
            border:1px solid #38bdf8;
        }

        /* IMAGE PREVIEW */

        .image-title{
            margin-top:20px;
            margin-bottom:10px;
            color:#cbd5e1;
            font-size:14px;
            font-weight:600;
        }

        .image-preview{
            width:100%;
            overflow:hidden;
            border-radius:16px;
            background:#0b1220;
            border:1px solid #1e293b;
        }

        .image-preview img{
            width:100%;
            max-height:400px;
            object-fit:contain;
            display:block;
        }

        /* FILE INPUT */

        .upload-section{
            margin-top:20px;
        }

        .upload-section label{
            display:block;
            margin-bottom:8px;
            color:#cbd5e1;
            font-size:14px;
            font-weight:600;
        }

        .upload-section input[type="file"]{
            width:100%;
            padding:12px;
            border-radius:12px;
            border:1px solid #1e293b;
            background:#0b1220;
            color:white;
        }

        /* BUTTON */

        .update-btn{
            width:100%;
            margin-top:25px;
            padding:14px;
            border:none;
            border-radius:14px;
            background:linear-gradient(
                135deg,
                #2563eb,
                #3b82f6
            );
            color:white;
            font-size:15px;
            font-weight:700;
            cursor:pointer;
            transition:0.2s;
        }

        .update-btn:hover{
            transform:translateY(-2px);
        }

        .update-btn:active{
            transform:scale(0.98);
        }

        /* MOBILE */

        @media(max-width:768px){

            h1{
                font-size:22px;
            }

            .card{
                padding:16px;
            }

            textarea{
                min-height:150px;
                font-size:14px;
            }

            .image-preview img{
                max-height:280px;
            }
        }

    </style>
</head>
<body>

<div class="container">

    <div class="top-nav">
        <a href="javascript:history.back()" class="back-arrow">←</a>
    </div>

    <h1>Edit Post</h1>

    <div class="card">

        <form method="POST" enctype="multipart/form-data">

            <textarea
                name="content"
                placeholder="What's on your mind?"
                required>{{ post.content }}</textarea>

            {% if post.image %}
            <div class="image-title">
                Current Image
            </div>

            <div class="image-preview">
                <img src="{{ post.image }}" alt="Post Image">
            </div>
            {% endif %}

            <div class="upload-section">
                <label>📷 Change Image</label>

                <input
                    type="file"
                    name="image"
                    accept="image/*">
            </div>

            <button
                type="submit"
                class="update-btn">
                Save Changes
            </button>

        </form>

    </div>

</div>

</body>
</html>
