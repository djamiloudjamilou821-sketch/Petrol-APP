<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ formula.name }} - Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* =========================
           CORE RESET & VARIABLES
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.93)), url("/static/bg.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f8fafc;
            min-height: 100vh;
            padding-bottom: 40px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 92%;
            max-width: 720px;
            margin: 0 auto;
            padding-top: 24px;
        }

        /* =========================
           NAVIGATION BAR ARCHITECTURE
        ========================= */
        .top-nav {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }

        .back-arrow {
            text-decoration: none;
            color: #94a3b8;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }

        .back-arrow:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* =========================
           FROSTED CALCULATOR CARD
        ========================= */
        .card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            padding: 32px 24px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .category {
            display: inline-block;
            background: rgba(37, 99, 235, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(37, 99, 235, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
            line-height: 1.25;
            margin-bottom: 12px;
        }

        .description {
            line-height: 1.6;
            color: #94a3b8;
            font-size: 14.5px;
            margin-bottom: 24px;
        }

        /* =========================
           RESPONSIVE FORMULA DISPLAY
        ========================= */
        .equation {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 22px;
            font-weight: 700;
            color: #10b981;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 18px 14px;
            border-radius: 12px;
            text-align: center;
            margin: 24px 0;
            overflow-x: auto;
            white-space: nowrap;
            /* Inward touch scrolling optimizations */
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        .section-title {
            margin-top: 24px;
            color: #38bdf8;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .variables {
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 16px;
            border-radius: 12px;
            line-height: 1.7;
            color: #cbd5e1;
            font-size: 14px;
            margin-top: 8px;
            white-space: pre-line;
        }

        /* =========================
           INPUT TERMINAL MATRIX
        ========================= */
        form {
            margin-top: 24px;
        }

        label {
            display: block;
            margin-top: 16px;
            margin-bottom: 6px;
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            background: #0f172a;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
            /* Disables standard iOS inner shadows and default mobile rendering */
            -webkit-appearance: none; 
            appearance: none;
        }

        input:focus {
            border-color: rgba(56, 189, 248, 0.6);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.15);
        }

        button {
            width: 100%;
            margin-top: 28px;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        button:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.35);
        }

        button:active {
            transform: scale(0.99);
        }

        /* =========================
           COMPUTED DATA OUTPUTS
        ========================= */
        .result {
            margin-top: 24px;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.25);
            padding: 20px;
            border-radius: 14px;
            text-align: center;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            color: #34d399;
            letter-spacing: -0.3px;
        }

        /* =========================
           RESPONSIVE RE-PROPORTIONS
        ========================= */
        @media (max-width: 600px) {
            .container {
                padding-top: 16px;
            }

            .card {
                padding: 24px 16px;
                border-radius: 16px;
            }

            h1 {
                font-size: 22px;
            }

            .description {
                font-size: 13.5px;
                margin-bottom: 20px;
            }

            .equation {
                font-size: 18px;
                padding: 14px 10px;
                margin: 20px 0;
            }

            input {
                padding: 12px;
                font-size: 15px;
            }

            button {
                padding: 14px;
                font-size: 15px;
                margin-top: 24px;
            }

            .result h2 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-nav">
        <a href="javascript:history.back()" class="back-arrow">⬅</a>
    </div>

    <div class="card">
        <div class="category">
            {{ formula.category }}
        </div>

        <h1>{{ formula.name }}</h1>

        <div class="description">
            {{ formula.description }}
        </div>

        <div class="equation">
            {{ formula.equation }}
        </div>

        <div class="section-title">📘 Variables & Reference Units</div>
        <div class="variables">{{ formula.variables }}</div>

        <form method="POST">
            {% for var in variables %}
                <label>Value for Variable [ {{ var }} ]</label>
                <input 
                    type="number" 
                    step="any" 
                    name="{{ var }}" 
                    placeholder="Enter raw numerical data..." 
                    required
                >
            {% endfor %}

            <button type="submit">⚙️ Run System Calculations</button>
        </form>

        {% if result is not none %}
        <div class="result">
            <h2>Result = {{ result }}</h2>
        </div>
        {% endif %}
    </div>
</div>

</body>
</html>
