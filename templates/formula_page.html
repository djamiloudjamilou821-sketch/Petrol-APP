<!DOCTYPE html>
<html>
<head>
    <title>{{ formula.name }}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">
    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#0f172a;
            color:white;
        }

        .container{
            width:92%;
            max-width:850px;
            margin:auto;
            padding:25px 0;
        }

        .card{
            background:#1e293b;
            padding:25px;
            border-radius:18px;
            margin-bottom:20px;
            box-shadow:0 5px 20px rgba(0,0,0,0.25);
        }

        h1{
            margin-top:0;
            font-size:32px;
            color:#38bdf8;
        }

        .equation{
            font-size:28px;
            font-weight:bold;
            color:#22c55e;
            margin:20px 0;
            text-align:center;
        }

        .section-title{
            margin-top:25px;
            color:#38bdf8;
            font-size:18px;
            font-weight:bold;
        }

        .description{
            line-height:1.7;
            color:#cbd5e1;
        }

        .variables{
            background:#0f172a;
            padding:15px;
            border-radius:12px;
            line-height:1.8;
            color:#e2e8f0;
            margin-top:10px;
            white-space:pre-line;
        }

        form{
            margin-top:25px;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:6px;
            color:#cbd5e1;
        }

        input{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#0f172a;
            color:white;
            font-size:16px;
            box-sizing:border-box;
        }

        input:focus{
            outline:none;
            border:2px solid #38bdf8;
        }

        button{
            width:100%;
            margin-top:25px;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#2563eb;
            color:white;
            font-size:17px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
        }

        .result{
            margin-top:25px;
            background:#14532d;
            padding:20px;
            border-radius:14px;
            text-align:center;
        }

        .result h2{
            margin:0;
            color:#86efac;
        }

        .example{
            background:#0f172a;
            padding:15px;
            border-radius:12px;
            margin-top:10px;
            line-height:1.8;
            color:#e2e8f0;
            white-space:pre-line;
        }

        .back{
            display:inline-block;
            margin-top:20px;
            text-decoration:none;
            color:#38bdf8;
        }

        .category{
            display:inline-block;
            background:#2563eb;
            padding:6px 12px;
            border-radius:30px;
            font-size:13px;
            margin-bottom:15px;
        }


    </style>
</head>

<body>

<div class="container">
    <div class="top-nav">
        <a href="javascript:history.back()" class="back-arrow">
            ⬅
        </a>
    </div>

    <div class="card">

        <div class="category">
            {{ formula.category }}
        </div>

        <h1>
            {{ formula.name }}
        </h1>

        <div class="description">
            {{ formula.description }}
        </div>

        <div class="equation">
            {{ formula.equation }}
        </div>

        <div class="section-title">
            📘 Variables
        </div>

        <div class="variables">
            {{ formula.variables }}
        </div>

        <form method="POST">

            {% for var in variables %}

                <label>
                    Enter {{ var }}
                </label>

                <input
                    type="number"
                    step="any"
                    name="{{ var }}"
                    required
                >

            {% endfor %}

            <button type="submit">
                ⚙️ Calculate
            </button>

        </form>

        {% if result is not none %}

        <div class="result">
            <h2>
                Result = {{ result }}
            </h2>
        </div>

        {% endif %}


    </div>

</div>

</body>
</html>
