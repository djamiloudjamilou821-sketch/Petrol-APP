<!DOCTYPE html>
<html>
<head>

    <title>Edit Profile</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#0f172a;
            color:white;
        }

        .container{
            width:92%;
            max-width:750px;
            margin:auto;
            padding:30px 0;
        }

        .card{
            background:#1e293b;
            padding:30px;
            border-radius:25px;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#38bdf8;
        }

        .profile-preview{
            text-align:center;
            margin-bottom:25px;
        }

        .profile-preview img{
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid #38bdf8;
            background:#334155;
        }

        .label{
            margin-top:18px;
            margin-bottom:8px;
            display:block;
            color:#cbd5e1;
            font-size:15px;
        }

        input,
        textarea{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#334155;
            color:white;
            font-size:15px;
            outline:none;
        }

        input:focus,
        textarea:focus{
            border:2px solid #38bdf8;
        }

        textarea{
            min-height:120px;
            resize:vertical;
        }

        input[type="file"]{
            background:#0f172a;
            border:2px dashed #475569;
            padding:18px;
            cursor:pointer;
        }

        button{
            width:100%;
            padding:15px;
            margin-top:30px;
            border:none;
            border-radius:14px;
            background:linear-gradient(135deg,#2563eb,#38bdf8);
            color:white;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.02);
            opacity:0.95;
        }

        .back-btn{
            display:block;
            text-align:center;
            margin-top:20px;
            color:#38bdf8;
            text-decoration:none;
            font-size:15px;
        }

        .back-arrow{
            text-decoration:none;
            color:white;
            font-size:22px;
            font-weight:bold;

            width:40px;
            height:40px;

            display:flex;
            align-items:center;
            justify-content:center;

            border-radius:10px;
            transition:0.2s;
        }

        .back-arrow:hover{
            background:#1e293b;
        }

    </style>

</head>

<body>

<div class="container">
    <a href="/profile" class="back-arrow">⬅</a>

    <div class="card">
        
        <h1>✏️ Edit Profile</h1>

        <div class="profile-preview">

            {% if user.profile_pic %}
                <img src="{{ user.profile_pic }}">
            {% else %}
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            {% endif %}

        </div>

        <form method="POST" enctype="multipart/form-data">

            <label class="label">Username</label>

            <input
                type="text"
                name="username"
                placeholder="Enter your username"
                value="{{ user.username }}"
            >

            <label class="label">Bio</label>

            <textarea
                name="bio"
                placeholder="Tell people about yourself..."
            >{{ user.bio }}</textarea>

            <label class="label">Country</label>

            <input
                type="text"
                name="country"
                placeholder="Your country"
                value="{{ user.country }}"
            >

            <label class="label">University</label>

            <input
                type="text"
                name="university"
                placeholder="Your university"
                value="{{ user.university }}"
            >

            <label class="label">Petroleum Level</label>

            <input
                type="text"
                name="petroleum_level"
                placeholder="Example: Beginner, Intermediate, Engineer..."
                value="{{ user.petroleum_level }}"
            >

            <label class="label">Upload Profile Picture</label>

            <input
                type="file"
                name="profile_pic"
                accept="image/*"
            >

            <button type="submit">
                💾 Save Profile
            </button>

        </form>

        
    </div>

</div>

</body>
</html>
