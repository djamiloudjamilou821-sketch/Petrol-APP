<!DOCTYPE html>
<html>
<head>
    <title>Porosity Calculator</title>
</head>
<body>

    <h1>🛢️ Porosity Calculator</h1>

    <form method="POST">
        <input type="number" step="any" name="vp" placeholder="Pore Volume" required><br><br>
        <input type="number" step="any" name="vt" placeholder="Total Volume" required><br><br>

        <button type="submit">Calculate</button>
    </form>

    {% if result is not none %}
        <h2>Porosity: {{ result }} %</h2>
    {% endif %}

    <br>
    <a href="/">Back Home</a>

</body>
</html>
